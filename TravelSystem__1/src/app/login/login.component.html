<div class="login-container">
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-card">
    <div class="card-header">
      <h1>Travel System</h1>
      <p>Welcome back! Please enter your details.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span class="icon">📧</span>
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="e.g. john&#64;rishabh.com"
          >
        </div>
        <div class="error-msg" *ngIf="loginForm.get('email')?.errors?.['required'] && loginForm.get('email')?.touched">
          Email is required
        </div>
        <div class="error-msg" *ngIf="loginForm.get('email')?.errors?.['email'] && loginForm.get('email')?.touched">
          Invalid email format
        </div>

      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper" [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="Enter your password"
          >
        </div>
        <div class="error-msg" *ngIf="loginForm.get('password')?.errors?.['required'] && loginForm.get('password')?.touched">
          Password is required
        </div>
        <div class="error-msg" *ngIf="loginForm.get('password')?.errors?.['minlength'] && loginForm.get('password')?.touched">
          Minimum 6 characters required
        </div>
      </div>

      <div class="form-footer">
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

      <div class="error-summary" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
    </form>

    <div class="card-footer">
      <p>Don't have an account? <a href="#">Contact Admin</a></p>
    </div>
  </div>
</div>
